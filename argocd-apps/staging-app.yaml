apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: staging-web-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/simaG19/eks-gitops-manifests'
    targetRevision: HEAD
    path: charts/web-app
    helm:
      valueFiles:
        - ../../environments/staging/values.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true